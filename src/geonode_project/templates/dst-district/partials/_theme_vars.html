/* Tema CMS — override token utama per data-theme. Simtaru = default :root.
   Disisipkan di dalam <style> (lihat base.html & halaman standalone). */
[data-theme="pesisir"] {
  --forest:#0E3F4F; --forest-700:#195A6E; --forest-500:#2F7E92;
  --cream:#F0EAD7; --cream-200:#E2D9BD; --cream-300:#CFC29A; --paper:#F7F2E3;
  --ochre:#D87A3C; --ochre-600:#B65F26; --ochre-100:#F5DDC4;
  --sage:#8AA8A8; --cocoa:#6E3E1F;
}
