# Override DEV untuk frontend — hot reload, tanpa rebuild tiap edit.
#
# docker-compose otomatis menggabungkan file ini saat `docker compose up`
# (tanpa -f). Frontend dijalankan dalam mode `next dev` dengan source ./frontend
# di-mount, sehingga perubahan kode langsung tampil di http://localhost:3000.
#
# - node_modules container dipertahankan lewat anonymous volume `/app/node_modules`
#   (mencegah node_modules host/Windows menimpa yang Linux).
# - target build `deps` (sudah punya node_modules lengkap + devDeps).
# - polling diaktifkan agar file-watcher andal di bind-mount Windows.
#
# Untuk kembali ke mode PRODUKSI: hapus/rename file ini lalu
# `docker compose up -d --build frontend`.
services:
  frontend:
    build:
      target: deps
    command: ["npm", "run", "dev", "--", "-H", "0.0.0.0", "-p", "3000"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - HOSTNAME=0.0.0.0
      - GEONODE_INTERNAL_URL=http://django:8000
      - NEXT_PUBLIC_GEONODE_URL=http://localhost
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    # next dev butuh sedikit waktu kompilasi saat request pertama
    healthcheck:
      start_period: 60s
